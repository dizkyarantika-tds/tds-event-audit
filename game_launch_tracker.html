<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Launch Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a19; padding: 1.5rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888780; margin-bottom: 1.25rem; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a19; cursor: pointer; }
  .table-wrap { border: 0.5px solid #e0e0dc; border-radius: 12px; overflow: hidden; overflow-x: auto; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 780px; }
  th { text-align: left; font-weight: 500; font-size: 12px; color: #888; padding: 10px 14px; background: #f5f5f2; border-bottom: 0.5px solid #e0e0dc; white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 0.5px solid #f0f0ec; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .nova { background: #E6F1FB; color: #0C447C; }
  .mythos { background: #EEEDFE; color: #3C3489; }
  .ludios { background: #FAEEDA; color: #633806; }
  .zephyr { background: #E1F5EE; color: #085041; }
  .central { background: #F1EFE8; color: #444441; }
  .date-past { color: #888; font-style: italic; }
  .date-soon { color: #854F0B; font-weight: 500; }
  .date-unset { color: #bbb; font-style: italic; }
  .unset { color: #bbb; font-style: italic; }
  code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; background: #f3f3f0; padding: 1px 5px; border-radius: 4px; }
  .count { font-size: 12px; color: #aaa; text-align: right; margin-top: 8px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; font-size: 12px; color: #888; align-items: center; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<h1>Game launch tracker</h1>
<p class="subtitle">Source: #game-launch-setup &nbsp;·&nbsp; Last updated 1 Jun 2026</p>

<div class="filters">
  <select id="studioFilter" onchange="render()">
    <option value="">All studios</option>
    <option>Nova</option>
    <option>Mythos</option>
    <option>Ludios</option>
    <option>Zephyr</option>
    <option>Central Tech</option>
  </select>
  <select id="teamFilter" onchange="render()">
    <option value="">All teams</option>
    <option>Polaris</option>
    <option>Hades</option>
    <option>Odyssey</option>
    <option>Cerberus</option>
    <option>Classic Games</option>
    <option>Zephyr</option>
    <option>Reactor</option>
  </select>
</div>

<div class="legend">
  <span>Soft launch date:</span>
  <span><span class="dot" style="background:#854F0B"></span> Within 30 days</span>
  <span><span class="dot" style="background:#aaa"></span> Past</span>
  <span><span class="dot" style="background:#ccc"></span> Not set</span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>App name</th>
        <th>Studio</th>
        <th>Team</th>
        <th>Analytical name</th>
        <th>Product manager</th>
        <th>Soft launch date</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="count" id="countLabel"></div>

<script>
const TODAY = new Date('2026-06-02');

const RAW = [
  {app:'Hexa Stack', studio:'Ludios', team:'Cerberus', analytical:null, pm:'artem.chupryna', date:'2026-07-31'},
  {app:'Triple Merge Island', studio:'Ludios', team:'Cerberus', analytical:null, pm:'ilya.buber', date:'2026-07-31'},
  {app:'Crostic', studio:'Nova', team:'Polaris', analytical:null, pm:'shayan.chatterjee', date:'2026-07-27'},
  {app:'Brilliant Blast', studio:'Mythos', team:'Hades', analytical:null, pm:'nikita.tolokonnikov', date:'2026-07-13'},
  {app:'Color Cube Blast 3D', studio:'Ludios', team:'Cerberus', analytical:null, pm:'ilya.buber', date:'2026-07-04'},
  {app:'Word Guesser', studio:'Mythos', team:'Odyssey', analytical:null, pm:'chun.lau', date:'2026-07-03'},
  {app:'Word Chain', studio:'Ludios', team:'Cerberus', analytical:null, pm:'ilya.buber', date:'2026-06-26'},
  {app:'Stack & Sort', studio:'Zephyr', team:'Zephyr', analytical:null, pm:'ihor.afanasiev', date:'2026-06-25'},
  {app:'Lumina', studio:'Mythos', team:'Odyssey', analytical:null, pm:'chun.lau', date:'2026-06-24'},
  {app:'Puzzle Guesser', studio:'Mythos', team:'Hades', analytical:'puzzleguess', pm:'antti.makkonen', date:'2026-06-22'},
  {app:'Nuts Pack', studio:'Zephyr', team:'Zephyr', analytical:'nutspack', pm:'yuri.chumachenko', date:'2026-06-16'},
  {app:'Marble Drop', studio:'Ludios', team:'Cerberus', analytical:null, pm:'artem.chupryna', date:'2026-06-13'},
  {app:'Nuts Pack: ASMR Nut Sort', studio:'Zephyr', team:'Zephyr', analytical:null, pm:'yuri.chumachenko', date:'2026-06-11'},
  {app:'Word Tile Scapes', studio:'Mythos', team:'Odyssey', analytical:'wordtilescapes', pm:'chun.lau', date:'2026-06-05'},
  {app:'Color Flow Sort', studio:'Mythos', team:'Hades', analytical:'colorflowsort', pm:'ozan.gunes', date:'2026-06-29'},
  {app:'Catman', studio:'Mythos', team:'Odyssey', analytical:'paccat', pm:'raheem.farooq', date:'2026-04-30'},
  {app:'Sushi Flow', studio:'Mythos', team:'Odyssey', analytical:'sushiflow', pm:'chun.lau', date:'2026-04-30'},
  {app:'Arrow Sort', studio:'Nova', team:'Polaris', analytical:'arrowsort', pm:'noah.mason', date:'2026-04-22'},
  {app:'Arrow Color Out', studio:'Mythos', team:'Odyssey', analytical:'arrowcolorout', pm:'chun.lau', date:'2026-04-14'},
  {app:'Card Association', studio:'Nova', team:'Classic Games', analytical:'cardassociations', pm:'luke.belto', date:'2026-03-09'},
  {app:'Vanilla', studio:'Central Tech', team:'Reactor', analytical:'vanillagame', pm:'malgorzata.blus', date:null},
  {app:'Tidal Tile', studio:'Mythos', team:'Odyssey', analytical:'tidaltile', pm:null, date:null},
];

function studioClass(s) {
  const m = {Nova:'nova', Mythos:'mythos', Ludios:'ludios', Zephyr:'zephyr', 'Central Tech':'central'};
  return m[s] || 'central';
}

function dateClass(d) {
  if (!d) return 'date-unset';
  const diff = (new Date(d) - TODAY) / 86400000;
  if (diff < 0) return 'date-past';
  if (diff <= 30) return 'date-soon';
  return '';
}

function fmtDate(d) {
  if (!d) return '<span class="date-unset">Not set</span>';
  const dt = new Date(d);
  const cls = dateClass(d);
  const label = dt.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  return `<span class="${cls}">${label}</span>`;
}

function fmtPM(pm) {
  if (!pm) return '<span class="unset">Not set</span>';
  return pm.split('@')[0].split('.').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function render() {
  const sf = document.getElementById('studioFilter').value;
  const tf = document.getElementById('teamFilter').value;

  let data = RAW.filter(r => (!sf || r.studio === sf) && (!tf || r.team === tf));

  data.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return new Date(b.date) - new Date(a.date);
  });

  document.getElementById('tbody').innerHTML = data.map(r => `
    <tr>
      <td>${r.app}</td>
      <td><span class="badge ${studioClass(r.studio)}">${r.studio}</span></td>
      <td>${r.team}</td>
      <td>${r.analytical ? `<code>${r.analytical}</code>` : '<span class="unset">Not set</span>'}</td>
      <td>${fmtPM(r.pm)}</td>
      <td>${fmtDate(r.date)}</td>
    </tr>
  `).join('');

  document.getElementById('countLabel').textContent = `Showing ${data.length} of ${RAW.length} games`;
}

render();
</script>
</body>
</html>
